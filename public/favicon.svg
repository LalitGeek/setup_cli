<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  
  <!-- Outer sleek hexagon container -->
  <polygon 
    points="50,8 88,28 88,72 50,92 12,72 12,28" 
    fill="url(#glow-grad)" 
    stroke="url(#logo-grad)" 
    stroke-width="5" 
    stroke-linejoin="round" 
  />
  
  <!-- Stylized Command Prompt Bracket '>' -->
  <path 
    d="M 32,34 L 52,50 L 32,66" 
    stroke="#ffffff" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
  />
  
  <!-- Styled glowing terminal cursor '_' -->
  <line 
    x1="60" 
    y1="66" 
    x2="74" 
    y2="66" 
    stroke="url(#logo-grad)" 
    stroke-width="8" 
    stroke-linecap="round" 
  />
</svg>